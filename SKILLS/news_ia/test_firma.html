<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Firma Codice Reale</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0d0d0d;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    gap: 80px;
    font-family: 'Arial Black', Arial, sans-serif;
  }

  h3 {
    color: #444;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: -60px;
    font-family: Arial, sans-serif;
    font-weight: 400;
  }

  /* =====================
     LOGO CERCHIO CR
  ===================== */
  .logo-cerchio {
    width: 64px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 0 1px rgba(201,169,110,0.2);
  }

  .logo-cr {
    color: #C9A96E;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: -1px;
    line-height: 1;
    margin-top: 4px;
  }

  .logo-corona {
    position: absolute;
    top: 6px;
    right: 10px;
  }

  /* =====================
     FIRMA A — Grande centrata
     Video drammatici tipo Ferrari
  ===================== */
  .firma-a {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 32px 50px;
    border-top: 1px solid rgba(201,169,110,0.15);
    border-bottom: 1px solid rgba(201,169,110,0.15);
    width: 340px;
  }

  .firma-a-top {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .firma-a-destra {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .firma-nome {
    color: #C9A96E;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .firma-handle {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    letter-spacing: 2px;
    font-family: Arial, sans-serif;
    font-weight: 400;
  }

  /* SEGNALE AI — cursore pulsante + codice binario */
  .firma-ai {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    justify-content: center;
  }

  .ai-linea {
    height: 1px;
    flex: 1;
    background: linear-gradient(to right, transparent, rgba(201,169,110,0.15));
  }
  .ai-linea-dx {
    background: linear-gradient(to left, transparent, rgba(201,169,110,0.15));
  }

  .ai-codice {
    color: rgba(201,169,110,0.25);
    font-size: 9px;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
    font-weight: 400;
    animation: pulsaCodice 3s ease-in-out infinite;
  }

  .cursore {
    display: inline-block;
    width: 6px;
    height: 10px;
    background: rgba(201,169,110,0.4);
    margin-left: 3px;
    animation: lampeggia 1.1s step-end infinite;
    vertical-align: middle;
  }

  @keyframes lampeggia {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes pulsaCodice {
    0%, 100% { opacity: 0.25; }
    50% { opacity: 0.55; }
  }

  /* =====================
     FIRMA B — Compatta orizzontale
     Post su sfondo scuro
  ===================== */
  .firma-b {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 24px;
    border-left: 2px solid rgba(201,169,110,0.5);
    width: 300px;
  }

  .logo-cerchio-sm {
    width: 44px;
    height: 44px;
    background: #1a1a1a;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 0 1px rgba(201,169,110,0.15);
  }

  .logo-cr-sm {
    color: #C9A96E;
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -1px;
    margin-top: 3px;
  }

  .logo-corona-sm {
    position: absolute;
    top: 4px;
    right: 7px;
  }

  .firma-b-destra {
    display: flex;
    flex-direction: column;
    gap: 3px;
    flex: 1;
  }

  .firma-b-nome {
    color: #C9A96E;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .firma-b-handle {
    color: rgba(255,255,255,0.2);
    font-size: 10px;
    letter-spacing: 2px;
    font-family: Arial, sans-serif;
  }

  .firma-b-ai {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 2px;
  }

  .ai-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(201,169,110,0.3);
    animation: pulsaDot 1.5s ease-in-out infinite;
  }
  .ai-dot:nth-child(2) { animation-delay: 0.2s; }
  .ai-dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulsaDot {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.3); }
  }

  .ai-micro {
    color: rgba(201,169,110,0.2);
    font-size: 8px;
    font-family: 'Courier New', monospace;
    letter-spacing: 1px;
    animation: pulsaCodice 2.5s ease-in-out infinite;
  }

</style>
</head>
<body>

  <h3>versione A — grande, per video drammatici</h3>

  <div class="firma-a">
    <div class="firma-a-top">
      <!-- Logo cerchio CR con corona -->
      <div class="logo-cerchio">
        <svg class="logo-corona" width="18" height="12" viewBox="0 0 28 18" fill="none">
          <path d="M2 16 L5 7 L10 13 L14 3 L18 13 L23 7 L26 16 Z" fill="#C9A96E" stroke="#C9A96E" stroke-width="0.5" stroke-linejoin="round"/>
          <rect x="2" y="15" width="24" height="2.5" rx="1" fill="#C9A96E"/>
          <circle cx="14" cy="3" r="1.8" fill="#C9A96E"/>
          <circle cx="5" cy="7" r="1.4" fill="#C9A96E"/>
          <circle cx="23" cy="7" r="1.4" fill="#C9A96E"/>
        </svg>
        <span class="logo-cr">CR</span>
      </div>
      <div class="firma-a-destra">
        <div class="firma-nome">Codice Reale...</div>
        <div class="firma-handle">@codicereale</div>
      </div>
    </div>
    <!-- Segnale AI — implicito -->
    <div class="firma-ai">
      <div class="ai-linea"></div>
      <span class="ai-codice">01001100<span class="cursore"></span></span>
      <div class="ai-linea ai-linea-dx"></div>
    </div>
  </div>

  <h3>versione B — compatta, per post su sfondo scuro</h3>

  <div class="firma-b">
    <div class="logo-cerchio-sm">
      <svg class="logo-corona-sm" width="13" height="8" viewBox="0 0 28 18" fill="none">
        <path d="M2 16 L5 7 L10 13 L14 3 L18 13 L23 7 L26 16 Z" fill="#C9A96E" stroke="#C9A96E" stroke-width="0.5" stroke-linejoin="round"/>
        <rect x="2" y="15" width="24" height="2.5" rx="1" fill="#C9A96E"/>
        <circle cx="14" cy="3" r="1.8" fill="#C9A96E"/>
        <circle cx="5" cy="7" r="1.4" fill="#C9A96E"/>
        <circle cx="23" cy="7" r="1.4" fill="#C9A96E"/>
      </svg>
      <span class="logo-cr-sm">CR</span>
    </div>
    <div class="firma-b-destra">
      <div class="firma-b-nome">Codice Reale...</div>
      <div class="firma-b-handle">@codicereale</div>
      <div class="firma-b-ai">
        <div class="ai-dot"></div>
        <div class="ai-dot"></div>
        <div class="ai-dot"></div>
        <span class="ai-micro">AI · 2026</span>
      </div>
    </div>
  </div>

</body>
</html>
